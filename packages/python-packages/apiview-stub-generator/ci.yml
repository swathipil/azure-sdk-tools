# NOTE: Please refer to https://aka.ms/azsdk/engsys/ci-yaml before editing this file.
trigger:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - packages/python-packages/apiview-stub-generator

pr:
  branches:
    include:
      - main
      - feature/*
      - release/*
      - hotfix/*
  paths:
    include:
      - packages/python-packages/apiview-stub-generator

extends:
  template: /eng/pipelines/templates/stages/archetype-sdk-tool-python.yml
  parameters:
    PythonVersion: '3.10'
    PackagePath: 'packages/python-packages/apiview-stub-generator'
    FeedName: 'public/azure-sdk-for-python'
    ArtifactName: 'apiviewparserpython'
    PackageName: 'Python API View Parser'
    TestSteps:
    - script: |
        python $(Build.SourcesDirectory)/eng/scripts/python_version_check.py
      displayName: 'Verify Python APIView version consistency'

    - task: UsePythonVersion@0
      displayName: 'Use Python 3.9'
      inputs:
        versionSpec: '3.9'

    - script: |
        cd $(Build.SourcesDirectory)/packages/python-packages/apiview-stub-generator
        python -m pip install tox
        tox -e pytest,stubgen
      displayName: Run APIView tests (Python 3.9)

    - task: UsePythonVersion@0
      displayName: 'Use Python 3.10'
      inputs:
        versionSpec: '3.10'

    - script: |
        cd $(Build.SourcesDirectory)/packages/python-packages/apiview-stub-generator
        python -m pip install tox
        tox -e pytest,stubgen
      displayName: Run APIView tests (Python 3.10)

    - task: UsePythonVersion@0
      displayName: 'Use Python 3.11'
      inputs:
        versionSpec: '3.11'

    - script: |
        cd $(Build.SourcesDirectory)/packages/python-packages/apiview-stub-generator
        python -m pip install tox
        tox -e pytest,stubgen
      displayName: Run APIView tests (Python 3.11)

    - task: UsePythonVersion@0
      displayName: 'Use Python 3.12'
      inputs:
        versionSpec: '3.12'

    - script: |
        cd $(Build.SourcesDirectory)/packages/python-packages/apiview-stub-generator
        python -m pip install tox
        tox -e pytest,stubgen
      displayName: Run APIView tests (Python 3.12)

    - task: UsePythonVersion@0
      displayName: 'Use Python 3.13'
      inputs:
        versionSpec: '3.13'

    - script: |
        cd $(Build.SourcesDirectory)/packages/python-packages/apiview-stub-generator
        python -m pip install tox
        tox -e pytest,stubgen
      displayName: Run APIView tests (Python 3.13)
